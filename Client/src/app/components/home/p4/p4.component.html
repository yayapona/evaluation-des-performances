<div class="container-fluid"> <!-- breadcrumb -->
    <div class="breadcrumb-header justify-content-between">
      <div class="my-auto">
        <div class="d-flex"><h4 class="content-title mb-0 my-auto">Contrat</h4><span
          class="text-muted mt-1 tx-13 ml-2 mb-0">/ Saisie de données</span></div>
      </div>
  </div>

  <ngx-spinner type="ball-scale-multiple">
  </ngx-spinner> 
  
<div  class="container">
    <div class="second-container">
        <div class="header">
            <button *ngFor='let itemDomaine of domaineList; let idx = index' (click)="onTabClick(idx, itemDomaine.critereWrappers)" [class.active]="activeTab == idx" class="item">{{itemDomaine.libelle_domaine}}</button>
            <!--<button (click)="onTabClick('Account Details')" [class.active]="activeTab == 'Account Details'" class="item">{{data1[1].libelle_domaine}}</button>
            <button (click)="onTabClick('Other Details')" [class.active]="activeTab == 'Other Details'" class="item">{{data1[2].libelle_domaine}}</button>
            <button (click)="onTabClick('domaine4')"  [class.active]="activeTab == 'domaine4'"  class="item">{{data1[3].libelle_domaine}}</button>-->
        </div>

        <div class="body">
            <h3 class="text-success">Liste des Critères</h3>
          <div class="body-element">
            <div class="table-responsive">
                <table class="table table-striped table-bordered mg-b-0 text-md-nowrap">
                  <thead>
                  <tr>
                    <th style="width: 45px;">N°</th>
                    <th>Critères</th>
                    <th style="width: 55px;">Action</th>
                  </tr>
                  </thead>
                  <tbody>
                  <tr *ngFor="let itemCritere of critereListByDomaine, let idx = index">
                    <td scope="row">{{ idx+1}}</td>
                    <td>{{itemCritere.libelleCritere}}</td>
                    <td>
                      <i style="color: #ff8000;" (click)="openModal(itemCritere)" class="side-menu__icon typcn typcn-plus"></i>
                    </td>
                  </tr>
                  </tbody>
                </table>
              </div>
          </div>

        </div>
    </div>
</div>
