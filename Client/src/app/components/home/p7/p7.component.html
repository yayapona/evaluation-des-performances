<div>
  <div class="container-fluid"> <!-- breadcrumb -->
    <div class="breadcrumb-header justify-content-between">
      <div class="my-auto">
        <div class="d-flex">
          <h4 class="content-title mb-0 my-auto">Contrat</h4>
          <span class="text-muted mt-1 tx-13 ml-2 mb-0">/ Évaluation</span>
        </div>
    </div>
</div>

<ngx-spinner type="ball-scale-multiple">
</ngx-spinner>

<h2 *ngIf="showCollaborateurs" class="text mt-4">Vos collaborateurs <i class="side-menu__icon typcn typcn-user icon"></i></h2>

<div *ngIf="showCollaborateurs" class="table-responsive">
  <table class="table table-striped table-bordered mg-b-0 text-md-nowrap">
    <thead>
    <tr>
      <th style="width:50px;">N°</th>
      <th>Nom</th>
      <th>Prénom</th>
      <th style="width: 130px;">Matricule</th>
      <th style="width: 250px;">email</th>
      <th style="width: 80px;">Evaluer</th>
    
    </tr>
    </thead>
    <tbody >
    <tr *ngFor="let item of data, let idx =index">
      <td scope="row">{{idx +1}}</td>
      <td>{{item.nom}}</td>
      <td>{{item.prenom}}</td>
      <td>{{item.matricule}}</td>
      <td>{{item.email}}</td>
      <td>
        <i (click)="showModal(item.id)" style="margin-right: 45px; font-size: 25px;color: #ff8000;" class="side-menu__icon typcn typcn-clipboard ms-4 con"></i>
      </td>
    </tr>
    </tbody>
  </table>
</div>
<h2 *ngIf="hideCollaborateurs" class="text mt-4" >Vous etes un agent, vous n'avez pas de collaborateurs</h2>
