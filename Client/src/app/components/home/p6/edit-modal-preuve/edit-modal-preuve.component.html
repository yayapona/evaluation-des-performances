<div class="modal-header" style="width: 498px; background-color: #ff8000;" >
  <h4 class="modal-title">Modification</h4>
</div>
<div class="input-group flex-nowrap">
    <form class="row g-3" [formGroup]="editPreuveForm" >
      <div class="col-4" style="width: 1015px; margin-bottom: 5px;">
        <label for="inputL" class="visually-show">Preuve</label>
        <input type="text" class="form-control" id="inputL" placeholder="Entrer la preuve de réalisation" formControlName="libelle_preuve">
      </div>
      <div class="col-2 ">
        <button (click)="updatePreuve()" type="submit" class="btn btn-primary mt-4 critere">Enregistrer</button>
      </div>
    </form>
  </div>
