<div class="modal-header" style="width: 498px; background-color: #ff8000;" >
  <h4 class="modal-title">Modification</h4>
</div>
<div class="input-group flex-nowrap">
    <form class="row g-3" [formGroup]="editOccurenceForm" >
    
      <div class="col-4" style="width: 900px; margin-bottom: 5px;">
        <label for="inputL" class="visually-show">Occurence</label>
        <input type="text" class="form-control" id="inputL" placeholder="Entrer l'occurence" formControlName="libelle_occurence">
      </div>
      <div class="col-1">
        <label for="inputL" class="visually-show">Note</label>
        <input type="number" class="form-control" id="inputL" placeholder="Entrer la note" formControlName="note">
      </div>
      <div class="col-2 ">
        <button (click)="updateOccurence()" class="btn btn-primary mt-4 domaine">Enregistrer</button>
      </div>
    </form>
  </div>
