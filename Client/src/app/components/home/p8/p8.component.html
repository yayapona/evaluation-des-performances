<ngx-spinner type="ball-scale-multiple">
</ngx-spinner>

<div>
    <div class="container-fluid"> <!-- breadcrumb -->
      <div class="breadcrumb-header justify-content-between">
        <div class="my-auto">
          <div class="d-flex">
            <h4 class="content-title mb-0 my-auto">Contrat</h4>
            <span class="text-muted mt-1 tx-13 ml-2 mb-0">/ Créer mon contrat</span>
          </div>
      </div>
  </div>


<button (click)="showModalContrat()" type="button" class="btn btn-primary">Créer mon contrat</button>
 <div class="table-responsive">
    <table class="table table-striped table-bordered mg-b-0 text-md-nowrap">
      <thead>
      <tr>
        <th>ANNÉE</th>
        <th>DIRECTION & FONCTION</th>
        <th>EVALUATEUR</th>
        <th>STATUS</th>
        <th style="width: 190px;">ACTION</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let item of data1" >
        <td scope="row">{{item.annee_contrat | date:'yyyy'}}</td>
        <td>
            {{item.agent.direction?.libele_long}}
             <br>
            {{item.agent_fonction}}
        </td>
        <td>
            {{item.nom_evaluateur}} {{item.prenom_evaluateur}}
        </td>
        <td>{{item.statut_contrat}}</td>
        <td>
          <i style="margin-left: 10px; font-size: 30px;color: #ff8000;" class="side-menu__icon typcn typcn-arrow-right-thick" routerLink="/home/p4"></i>
          <i (click)="updateContratS(item.id)" style="margin-left: 10px; font-size: 25px;color: red;" class="side-menu__icon typcn typcn-download" ></i>
          <i (click)="openModalContrat(item.id)" style="margin-left: 10px; font-size: 30px;color: green;" class="side-menu__icon typcn typcn-eye"></i>
        </td>
      </tr>
      </tbody>
    </table>
</div>
