<div class="modal-header" style="width: 498px; background-color: #ff8000; margin-left: -0.5px;" >
  <h4 class="modal-title">Modification</h4>
</div>

<ngx-spinner type="ball-scale-multiple">
</ngx-spinner>

<div class="input-group flex-nowrap">
    <form class="row g-3" [formGroup]="editDomaineForm">
      <div class="col-6" style="width: 705px; margin-bottom: 8px;">
        <label for="inputL" class="visually-show">Domaine</label>
        <input type="text" class="form-control" id="inputL" placeholder="Entrer le domaine" formControlName="libelle_domaine">
      </div>
      <div class="col-2 mt-4 ">
        <button (click)="updateDomaine()"  class="btn btn-primary mt-4 domaine">Enregistrer</button>
      </div>
    </form>
  </div>
