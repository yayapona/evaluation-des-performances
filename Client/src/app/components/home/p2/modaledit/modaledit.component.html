<div class="input-group flex-nowrap">
    <form [formGroup]="editFonctionForm">
        <div class="col-3">
            <label for="">Date fin</label>
            <input type="date" class="form-control" placeholder="" aria-label="Username" aria-describedby="addon-wrapping" formControlName="datefin">
        </div>
        <div class="col-2">
            <label for="">Statut</label>
            <input type="text" class="form-control" placeholder="Username" aria-label="Username" aria-describedby="addon-wrapping" formControlName="status">
        </div>
        <div class="col-3">
            <button class="btn btn-primary">Enrégistrer</button>
            <button class="btn btn-danger">Annuler</button>
        </div>
    </form>
