<ngx-spinner type="ball-scale-multiple">
</ngx-spinner>

<div class="container-fluid"> <!-- breadcrumb -->
    <div class="breadcrumb-header justify-content-between">
      <div class="my-auto">
        <div class="d-flex"><h4 class="content-title mb-0 my-auto">Saisies</h4><span
          class="text-muted mt-1 tx-13 ml-2 mb-0">/ Saisie de données</span></div>
      </div>
    </div>
      
    <ngx-spinner type="ball-scale-multiple">
    </ngx-spinner>
    

    <div class="row row-sm ">
      <div class="col-xl-12">
        <div class="card mg-b-20">
          <div class="card-header pt-3 pb-0">
          <div class="card-body">
            <div class="row mg-b-20">
              <div class="col-sm-12 col-md-2">
                <button class="btn btn-primary btn-block" (click)="openModal()"><i class="typcn typcn-plus"></i>Ajouter</button>
              </div>
            </div>
            <div class="row">
              <div class="col-md-8">
                <h6>Total enregistrement  <span class="badge badge-danger">{{data1}}</span></h6>
              </div>
              <div class="col-md-4">
                <input class="form-control" style="background-color: white;border-radius: 3px" placeholder="Recherche par mots clé ..." type="search">
              </div>
            </div><br>

            <div class="table-responsive">
              <table class="table table-striped table-bordered mg-b-0 text-md-nowrap">
                <thead>
                <tr>
                  <th>N°</th>
                  <th>Nom</th>
                  <th>Prénom</th>
                  <th>Matricule</th>
                  <th>Email</th>
                  <th>Rang</th>
                  <th>Fonction</th>
                  <th style="width: 145px;">Action</th>
                
                </tr>
                </thead>
                <tbody>
                <tr *ngFor="let item of data, let idx = index">
                  <td scope="row">{{idx+1}}</td>
                  <td>{{item.nom}}</td>
                  <td>{{item.prenom}}</td>
                  <td>{{item.matricule}}</td>
                  <td>{{item.email}}</td>
                  <td>{{item.rang}}</td>
                  <td>{{item.fonction}}</td>
                  <td>
                    <i style="font-size: 25px; color: #ff8000; margin-left:15px;" class="side-menu__icon typcn typcn-edit"></i>
                    <i style="font-size: 25px; color: red; margin-left:15px;" (click)="deleteAgent(item.id)" class="side-menu__icon typcn typcn-trash"></i>
                  </td>
                </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
